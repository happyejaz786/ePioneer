<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advance Excel Card</title>
    <!-- Linking your CSS file -->
    <link rel="stylesheet" href="style1.css">
</head>
<body>

    <!-- Main 800x600 Container -->
    <div class="excel-card">
        
        <!-- Background Decorative Curves -->
        <div class="curve-orange"></div>
        <div class="curve-dark"></div>
        <div class="curve-lines"></div>

        <!-- CSS Only Excel Logo -->
        <div class="excel-logo">
            <div class="logo-back"></div>
            <div class="logo-front">X</div>
        </div>

        <!-- Text Content -->
        <div class="content-area">
            
            <div class="text-learn">LEARN</div>
            <div class="text-advance">Advance</div>
            <div class="text-excel">Excel</div>
            <div class="text-course">Course</div>

            <div class="list-title">Course Contents</div>
            <ul class="course-list">
                <li>Data Analytics</li>
                <li>Data Cleaning</li>
                <li>Pivot Tables</li>
                <li>Reporting Data Lookup</li>
                <li>What If Analysis</li>
                <li>Essential short-cuts</li>
                <li>Logical Statements</li>
                <li>Working with Dates</li>
            </ul>
        </div>

        <!-- Slanted JOIN NOW Button -->
        <div class="join-btn">
            JOIN NOW
        </div>

    </div>

</body>
</html>
